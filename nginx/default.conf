server {
  listen 80;
  server_name _;

  # Use Docker embedded DNS resolver so nginx can resolve service names at runtime.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_host api:3001;

  # Phone photos are often several MB; nginx default (1m) causes 413 and "upload doesn't work".
  client_max_body_size 25m;

  root /usr/share/nginx/html;
  index index.html;

  # WebSocket upgrade for Socket.IO (realtime chat).
  location /api/socket.io/ {
    proxy_pass http://$api_host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://$api_host;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://$api_host;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Cache-bust strategy for Telegram WebView:
  # - HTML must always revalidate (otherwise Telegram may keep showing an old bundle after deploy).
  # - Fingerprinted assets can be cached "forever".
  location ~* \\.(?:js|css|map|png|jpg|jpeg|gif|svg|webp|ico|mp4|woff2?|ttf)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri /index.html;
  }
}
